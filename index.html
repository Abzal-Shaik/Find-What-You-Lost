<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Found Your Missing Object</title>

<style>

body{
    font-family: Arial;
    background:#f4f4f4;
    margin:0;
}

.container{
    max-width:700px;
    margin:60px auto;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
    text-align:center;
}

h1{
    color:#333;
}

.button{
    width:200px;
    padding:15px;
    margin:15px;
    border:none;
    background:#333;
    color:white;
    font-size:18px;
    border-radius:6px;
    cursor:pointer;
}

.button:hover{
    background:#555;
}

.form-container{
    display:none;
    text-align:left;
    margin-top:30px;
}

label{
    font-weight:bold;
    margin-top:10px;
    display:block;
}

input, textarea{
    width:100%;
    padding:10px;
    margin-top:5px;
    border-radius:5px;
    border:1px solid #ccc;
}

.submit{
    margin-top:20px;
    padding:12px;
    background:#333;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

.submit:hover{
    background:#555;
}

.posts{
    margin-top:20px;
}

.post{
    background:#e9e9e9;
    padding:15px;
    border-radius:6px;
    margin-bottom:15px;
}

.post img{
    width:150px;
    margin-top:10px;
    border-radius:6px;
}

</style>
</head>

<body>

<div class="container">

<h1>Found Your Missing Object</h1>

<button class="button" onclick="showSection('post')">Post</button>
<button class="button" onclick="showSection('view')">View</button>

<!-- POST SECTION -->

<div id="form-section" class="form-container">

<form id="postForm">

<label>Item Name</label>
<input type="text" id="item" required>

<label>Description</label>
<textarea id="description" rows="4" required></textarea>

<label>Location Found</label>
<input type="text" id="location" required>

<label>Upload Image</label>
<input type="file" id="image" accept="image/*">

<button type="submit" class="submit">Post It</button>

</form>

</div>

<!-- VIEW SECTION -->

<div id="view-section" class="form-container">

<div class="posts" id="postsContainer"></div>

</div>

</div>

<script>

function showSection(section){

document.getElementById("form-section").style.display =
(section==="post") ? "block":"none";

document.getElementById("view-section").style.display =
(section==="view") ? "block":"none";

}

window.onload=function(){
displayPosts();
}

document.getElementById("postForm").addEventListener("submit",function(e){

e.preventDefault();

const item=document.getElementById("item").value;
const description=document.getElementById("description").value;
const location=document.getElementById("location").value;
const imageInput=document.getElementById("image");

const reader=new FileReader();

reader.onload=function(){

const post={
item:item,
description:description,
location:location,
image:reader.result
};

let posts=JSON.parse(localStorage.getItem("posts")) || [];

posts.push(post);

localStorage.setItem("posts",JSON.stringify(posts));

document.getElementById("postForm").reset();

displayPosts();

showSection("view");

}

if(imageInput.files[0]){
reader.readAsDataURL(imageInput.files[0]);
}
else{
reader.onload();
}

});

function displayPosts(){

const container=document.getElementById("postsContainer");

container.innerHTML="";

let posts=JSON.parse(localStorage.getItem("posts")) || [];

posts.forEach(post=>{

const div=document.createElement("div");

div.className="post";

div.innerHTML=`
<h3>${post.item}</h3>
${post.image ? `<img src="${post.image}">` : ""}
<p><strong>Description:</strong> ${post.description}</p>
<p><strong>Location Found:</strong> ${post.location}</p>
`;

container.appendChild(div);

});

}

</script>

</body>
</html>
